<!DOCTYPE html>
<html>

<head>
    <title>Ajouter projet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <div class="logo">MonPortfolio</div>
</header>
<div class="container">
    <h1>Ajouter un projet</h1>
    <!-- FORMULAIRE -->
    <form>
        <label>Libellé :</label><br>
        <input type="text" placeholder="Nom du projet"><br><br>

        <label>Description :</label><br>
        <textarea placeholder="Description du projet"></textarea><br><br>
        <label>Image :</label><br>
        <input type="file"><br><br>

        <label>Technologies :</label><br>
        <input type="text" placeholder="Ex: HTML, CSS, JavaScript"><br><br>
        <button type="submit">Ajouter</button>

    </form>
</div>
<footer>
    <p>© 2026 Mon Portfolio</p>
</footer>
</body>
</html>
