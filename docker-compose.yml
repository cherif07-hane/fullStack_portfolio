services:
  mongo:
    image: mongo:7
    container_name: portfolio-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    image: richef07/porfoliocherif-api:latest
    container_name: portfolio-api
    restart: unless-stopped
    command: npm run api:dev
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/fullstack_portfolio
      CLIENT_ORIGIN: http://localhost:5173
      ADMIN_PASSWORD: admin123
      ADMIN_SECRET: local-docker-admin-secret
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: .
    image: richef07/porfoliocherif-frontend:latest
    container_name: portfolio-frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://api:5000
      VITE_API_URL: /api/projets
      VITE_ADMIN_API_URL: /api/admin
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

volumes:
  mongo_data:
  node_modules:
